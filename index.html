<style>
  :root{
    --bg:#EFEDE7;
    --surface:#FFFFFF;
    --ink:#1B1D24;
    --header:#1B1D24;
    --muted:#83868F;
    --line:#E4E1D9;
    --line-soft:#EFEDE6;
    --brand:#F2562F;
    --brand-soft:#FDE7DF;
    --done:#1F9D6B;
    --done-soft:#E0F2E9;
    --heat0:#EDEBE4;
    --heat4:#1F9D6B;
    --display:"Space Grotesk",ui-sans-serif,system-ui,sans-serif;
    --body:"Inter",ui-sans-serif,system-ui,sans-serif;
    --mono:"Space Mono","SFMono-Regular",ui-monospace,monospace;
    --radius:20px;
    --maxw:560px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.45;overscroll-behavior-y:none}

  /* Dark app bar (sits under the Dynamic Island) */
  .appbar{position:sticky;top:0;z-index:20;background:var(--header);color:#fff;padding:calc(env(safe-area-inset-top) + 14px) 20px 15px}
  .appbar .row{display:flex;align-items:center;justify-content:space-between;max-width:var(--maxw);margin:0 auto}
  .brand{display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:700;font-size:23px;letter-spacing:-.02em}
  .brand .mark{flex:0 0 auto}
  .gear{background:rgba(255,255,255,.08);border:0;width:38px;height:38px;border-radius:50%;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .gear:active{background:rgba(255,255,255,.18)}
  .appbar .date{max-width:var(--maxw);margin:6px auto 0;font-family:var(--mono);font-size:12px;color:#9aa0ab;text-transform:capitalize}

  .app{max-width:var(--maxw);margin:0 auto;padding:18px 18px calc(env(safe-area-inset-bottom) + 104px)}

  /* Cards */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .stack{display:flex;flex-direction:column;gap:12px}

  /* Today summary */
  .summary{display:flex;align-items:center;gap:20px;margin-bottom:16px}
  .ring{position:relative;width:104px;height:104px;flex:0 0 auto}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .pct b{font-family:var(--mono);font-weight:700;font-size:24px;line-height:1}
  .ring .pct span{font-size:10.5px;color:var(--muted);margin-top:2px}
  .summary-text h2{font-family:var(--display);font-weight:700;font-size:21px;margin:0 0 3px;letter-spacing:-.01em}
  .summary-text p{margin:0;color:var(--muted);font-size:14px}

  /* Habit row */
  .habit{display:flex;align-items:center;gap:14px;padding:16px;background:var(--surface);border:1px solid var(--line);border-radius:18px;cursor:pointer;transition:.15s;user-select:none}
  .habit:active{transform:scale(.99)}
  .habit.done{background:var(--done-soft);border-color:#CDEBDC}
  .habit.due{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .banner{background:var(--brand-soft);color:#B83A18;border:1px solid #F6C6B6;border-radius:14px;padding:12px 16px;margin-bottom:12px;font-family:var(--display);font-weight:600;font-size:14px}
  .h-emoji{width:48px;height:48px;flex:0 0 auto;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:23px}
  .h-main{flex:1;min-width:0}
  .h-name{font-family:var(--display);font-weight:600;font-size:16.5px;letter-spacing:-.01em}
  .habit.done .h-name{color:#157A52}
  .h-streak{font-size:13px;color:var(--muted);margin-top:2px}
  .check{width:34px;height:34px;flex:0 0 auto;border-radius:50%;border:2.5px solid var(--line);display:flex;align-items:center;justify-content:center;transition:.15s}
  .habit.done .check{background:var(--done);border-color:var(--done)}
  .check svg{opacity:0;transition:.15s}
  .habit.done .check svg{opacity:1}

  /* Buttons */
  .btn{font-family:var(--display);font-weight:600;font-size:15px;border-radius:14px;padding:14px 16px;cursor:pointer;border:1px solid transparent;transition:.15s}
  .btn-primary{background:var(--brand);color:#fff}
  .btn-primary:active{background:#DE4623}
  .btn-ghost{background:var(--surface);border-color:var(--line);color:var(--ink)}
  .btn-block{width:100%}
  .add-row{margin-top:14px}

  /* Manage list */
  .m-habit{display:flex;align-items:center;gap:13px;padding:15px 14px;border-bottom:1px solid var(--line-soft)}
  .m-habit:last-child{border-bottom:0}
  .m-meta{flex:1;min-width:0}
  .m-meta .n{font-family:var(--display);font-weight:600;font-size:16px}
  .m-meta .f{font-size:12.5px;color:var(--muted);margin-top:2px}
  .icon-btn{background:transparent;border:0;cursor:pointer;color:var(--muted);padding:8px;border-radius:10px;font-size:16px}
  .icon-btn:active{background:var(--bg)}

  /* Stats */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:15px}
  .stat .v{font-family:var(--mono);font-weight:700;font-size:25px;line-height:1}
  .stat .v .gico{font-size:19px}
  .stat .k{font-size:11.5px;color:var(--muted);margin-top:6px}
  .prog-card{margin-bottom:12px}
  .prog-head{display:flex;align-items:center;gap:11px;margin-bottom:13px}
  .prog-head .e{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px}
  .prog-head .nm{font-family:var(--display);font-weight:600;font-size:16px;flex:1}
  .prog-head .st{font-family:var(--mono);font-size:14px;color:var(--brand);font-weight:700}
  .heat{display:flex;gap:3px;overflow-x:auto;padding-bottom:4px}
  .heat-col{display:flex;flex-direction:column;gap:3px}
  .cell{width:13px;height:13px;border-radius:3px;background:var(--heat0)}
  .cell.off{background:transparent}
  .prog-foot{display:flex;justify-content:space-between;margin-top:12px;font-size:12.5px;color:var(--muted)}
  .prog-foot b{font-family:var(--mono);color:var(--ink)}

  /* Empty */
  .empty{text-align:center;padding:46px 20px;color:var(--muted)}
  .empty .big{margin:0 auto 14px;width:60px;height:60px}
  .empty h2{font-family:var(--display);margin:0 0 6px;font-size:19px;color:var(--ink)}
  .empty p{margin:0 0 18px;font-size:14px}

  /* Bottom navigation */
  .bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(248,247,243,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
  .bottomnav .inner{display:flex;max-width:var(--maxw);margin:0 auto;padding:9px 20px 8px}
  .navbtn{flex:1;border:0;background:transparent;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);cursor:pointer;padding:4px 0}
  .navbtn .ico{width:25px;height:25px}
  .navbtn .lbl{font-family:var(--display);font-weight:600;font-size:11px;letter-spacing:.01em}
  .navbtn.active{color:var(--brand)}
  .navbtn:active{opacity:.6}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(20,21,28,.45);display:none;align-items:flex-end;justify-content:center;z-index:50;backdrop-filter:blur(2px)}
  .overlay.show{display:flex}
  .sheet{background:var(--surface);width:100%;max-width:520px;border-radius:24px 24px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));animation:rise .22s ease;max-height:90vh;overflow-y:auto}
  @media(min-width:560px){.overlay{align-items:center}.sheet{border-radius:24px}}
  @keyframes rise{from{transform:translateY(30px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .sheet h3{font-family:var(--display);font-weight:700;font-size:20px;margin:0 0 18px;letter-spacing:-.01em}
  .field{margin-bottom:16px}
  .field>label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px}
  .field input[type=text]{width:100%;font-family:var(--body);font-size:16px;padding:13px 14px;border:1px solid var(--line);border-radius:12px;background:var(--bg);color:var(--ink)}
  .field input[type=text]:focus{outline:none;border-color:var(--brand)}
  .picker{display:flex;gap:9px;flex-wrap:wrap}
  .swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.12s}
  .swatch.sel{border-color:var(--ink)}
  .emoji-pick{display:flex;gap:7px;flex-wrap:wrap}
  .emo{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:var(--bg);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .emo.sel{border-color:var(--brand);background:var(--brand-soft)}
  .freq{display:flex;gap:6px}
  .day{flex:1;text-align:center;font-family:var(--display);font-weight:600;font-size:13px;padding:11px 0;border:1px solid var(--line);border-radius:11px;background:var(--bg);color:var(--muted);cursor:pointer;transition:.12s}
  .day.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .seg{display:flex;gap:6px;margin-bottom:12px}
  .seg button{flex:1;font-family:var(--display);font-weight:600;font-size:14px;padding:11px;border:1px solid var(--line);border-radius:11px;background:var(--bg);color:var(--muted);cursor:pointer}
  .seg button.on{background:var(--brand-soft);color:var(--brand);border-color:var(--brand)}
  .sheet-actions{display:flex;gap:10px;margin-top:6px}
  .sheet-actions .btn{flex:1}
  .danger{color:var(--brand);text-align:center;font-size:14px;font-weight:600;background:none;border:0;cursor:pointer;width:100%;margin-top:14px;padding:10px;font-family:var(--display)}
</style>

<div class="appbar">
  <div class="row">
    <div class="brand">
      <svg class="mark" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="#F2562F" stroke-width="2.4"/>
        <circle cx="12" cy="12" r="4.6" stroke="#FDBA8C" stroke-width="2.4"/>
        <circle cx="12" cy="12" r="1.5" fill="#F2562F"/>
      </svg>
      Racha
    </div>
    <button class="gear" id="gearBtn" title="Ajustes">&#9881;&#65038;</button>
  </div>
  <div class="date" id="dateLabel"></div>
</div>

<div class="app"><div id="content"></div></div>

<nav class="bottomnav">
  <div class="inner">
    <button class="navbtn active" data-view="today">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12.3l2.6 2.6L16 9.5"/></svg>
      <span class="lbl">Hoy</span>
    </button>
    <button class="navbtn" data-view="habits">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7h14M5 12h14M5 17h14"/></svg>
      <span class="lbl">Hábitos</span>
    </button>
    <button class="navbtn" data-view="progress">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19V11M12 19V5M19 19v-7"/></svg>
      <span class="lbl">Progreso</span>
    </button>
  </div>
</nav>

<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>

<script>
const KEY = "racha:data";
const COLORS = ["#F2562F","#1F9D6B","#2D6CDF","#8B5CF6","#E0A823","#E0467E","#0EA5A5","#5B6470"];
const EMOJIS = ["🎯","🏃","💧","📚","🧘","💪","🥗","😴","🦷","✍️","🌱","☀️","💊","🚭","💻","🎸","📵","🧹","💰","☎️"];
const DAYS = ["L","M","X","J","V","S","D"];
const DAY_IDX = [1,2,3,4,5,6,0];

let state = { habits: [], completions: {} };
let view = "today";

/* ---------- storage (window.storage inside Claude, localStorage standalone on iPhone) ---------- */
const useCloud = (typeof window !== "undefined" && window.storage);
async function readRaw(){
  if(useCloud){ try{ const r=await window.storage.get(KEY); return r&&r.value; }catch(e){ return null; } }
  try{ return localStorage.getItem(KEY); }catch(e){ return null; }
}
async function writeRaw(v){
  if(useCloud){ try{ await window.storage.set(KEY, v); return; }catch(e){} }
  try{ localStorage.setItem(KEY, v); }catch(e){ console.warn("save failed", e); }
}
async function load(){
  try{ const raw = await readRaw(); if(raw){ state = JSON.parse(raw); } }catch(e){}
  if(!state.habits) state.habits = [];
  if(!state.completions) state.completions = {};
}
async function save(){ await writeRaw(JSON.stringify(state)); }

/* ---------- date / streak helpers ---------- */
function dk(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function today(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function scheduled(h,d){ return h.freq==="daily" ? true : h.freq.includes(d.getDay()); }
function nowMin(){ const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function toMin(t){ const p=t.split(":"); return (+p[0])*60+(+p[1]); }
function currentStreak(h){
  const c=state.completions[h.id]||{}; const tk=dk(today());
  let d=today(), s=0;
  for(let i=0;i<800;i++){
    if(scheduled(h,d)){ const k=dk(d); if(c[k])s++; else if(k===tk){} else break; }
    d.setDate(d.getDate()-1);
  }
  return s;
}
function bestStreak(h){
  const c=state.completions[h.id]||{};
  const keys=Object.keys(c).filter(k=>c[k]).sort();
  if(!keys.length) return 0;
  let st=new Date(keys[0]); st.setHours(0,0,0,0);
  let d=new Date(st), end=today(), run=0, best=0;
  while(d<=end){ if(scheduled(h,d)){ if(c[dk(d)]){run++;best=Math.max(best,run);} else run=0; } d.setDate(d.getDate()+1); }
  return best;
}
function completionRate(h){
  const c=state.completions[h.id]||{};
  let st=new Date(h.createdAt); st.setHours(0,0,0,0);
  let d=new Date(st), end=today(), sched=0, done=0;
  while(d<=end){ if(scheduled(h,d)){ sched++; if(c[dk(d)]) done++; } d.setDate(d.getDate()+1); }
  return sched? Math.round(done/sched*100) : 0;
}

/* ---------- actions ---------- */
function toggleToday(id){
  const tk=dk(today());
  if(!state.completions[id]) state.completions[id]={};
  if(state.completions[id][tk]) delete state.completions[id][tk]; else state.completions[id][tk]=true;
  save(); render();
}
function uid(){ return "h"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

/* ---------- home-screen icon badge + on-open notice ---------- */
function pendingToday(){
  const tk=dk(today());
  return todaysHabits().filter(h=>!(state.completions[h.id]&&state.completions[h.id][tk]));
}
function updateBadge(){
  try{
    if(!navigator.setAppBadge) return;
    const n=pendingToday().length;
    n>0 ? navigator.setAppBadge(n) : navigator.clearAppBadge();
  }catch(e){}
}
function maybeNotify(){
  if(!state.notify) return;
  if(!("Notification" in window) || Notification.permission!=="granted") return;
  const due=pendingToday().filter(h=>h.remindAt && nowMin()>=toMin(h.remindAt));
  if(!due.length) return;
  try{
    const icon=(document.querySelector('link[rel="apple-touch-icon"]')||{}).href;
    new Notification("Racha 🎯",{ body: due.length===1?`Pendiente: ${due[0].name}`:`Tienes ${due.length} hábitos pendientes`, icon });
  }catch(e){}
}

/* ---------- render ---------- */
const content = document.getElementById("content");
function render(){
  document.querySelectorAll(".navbtn").forEach(t=>t.classList.toggle("active",t.dataset.view===view));
  if(view==="today") renderToday();
  else if(view==="habits") renderHabits();
  else renderProgress();
}
function todaysHabits(){ return state.habits.filter(h=>scheduled(h,today())); }

function renderToday(){
  if(!state.habits.length){ content.innerHTML=emptyState("Aún no tienes hábitos","Crea tu primer hábito y empieza tu racha hoy."); bindAdd(); updateBadge(); return; }
  const tk=dk(today());
  let list=todaysHabits().map(h=>{
    const done=!!(state.completions[h.id]&&state.completions[h.id][tk]);
    const overdue=!done && !!h.remindAt && nowMin()>=toMin(h.remindAt);
    return {h,done,overdue};
  });
  const total=list.length;
  const doneCount=list.filter(x=>x.done).length;
  const overdueCount=list.filter(x=>x.overdue).length;
  const pct=total?Math.round(doneCount/total*100):0;
  const rank=x=>x.done?2:(x.overdue?0:1);
  list.sort((a,b)=>{ if(rank(a)!==rank(b))return rank(a)-rank(b); const ta=a.h.remindAt?toMin(a.h.remindAt):9999, tb=b.h.remindAt?toMin(b.h.remindAt):9999; return ta-tb; });
  const C=2*Math.PI*44, off=C-(pct/100)*C;
  let html=`<div class="card" style="margin-bottom:8px"><div class="summary">
      <div class="ring"><svg width="104" height="104" viewBox="0 0 104 104">
        <circle cx="52" cy="52" r="44" fill="none" stroke="var(--line)" stroke-width="10"/>
        <circle cx="52" cy="52" r="44" fill="none" stroke="${pct===100?'var(--done)':'var(--brand)'}" stroke-width="10" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}" style="transition:.4s"/>
      </svg><div class="pct"><b>${pct}%</b><span>hoy</span></div></div>
      <div class="summary-text"><h2>${doneCount===total&&total>0?"¡En el blanco! 🎯":"Vamos a por ello"}</h2>
      <p>${doneCount} de ${total} hábito${total!==1?"s":""} hecho${doneCount!==1?"s":""} hoy.</p></div>
    </div></div>`;
  if(overdueCount>0) html+=`<div class="banner">⏰ ${overdueCount} pendiente${overdueCount!==1?"s":""} a esta hora</div>`;
  if(!total){ html+=`<div class="empty card"><p>Hoy no toca ningún hábito. Descansa o crea uno nuevo.</p></div>`; }
  else{
    html+=`<div class="stack">`+list.map(({h,done,overdue})=>{
      const s=currentStreak(h);
      const sub = done ? "✓ Hecho hoy"
        : (h.remindAt ? `${overdue?"⏰ ":"🕗 "}${h.remindAt}${s>0?` · 🎯 ${s}`:""}`
           : (s>0?`🎯 ${s} día${s!==1?"s":""} seguidos`:"Empieza tu racha"));
      return `<div class="habit ${done?'done':''} ${overdue?'due':''}" onclick="toggleToday('${h.id}')">
        <div class="h-emoji" style="background:${h.color}1f">${h.emoji}</div>
        <div class="h-main"><div class="h-name">${esc(h.name)}</div>
        <div class="h-streak">${sub}</div></div>
        <div class="check"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>`;
    }).join("")+`</div>`;
  }
  html+=`<div class="add-row"><button class="btn btn-ghost btn-block" id="addBtn">+ Nuevo hábito</button></div>`;
  content.innerHTML=html; bindAdd(); updateBadge();
}

function renderHabits(){
  if(!state.habits.length){ content.innerHTML=emptyState("Sin hábitos todavía","Aquí gestionas y editas todos tus hábitos."); bindAdd(); return; }
  let html=`<div class="card stack" style="padding:4px 14px">`+state.habits.map(h=>{
    const f=(h.freq==="daily"?"Cada día":h.freq.map(d=>DAYS[DAY_IDX.indexOf(d)]).join(" · "))+(h.remindAt?` · ⏰ ${h.remindAt}`:"");
    return `<div class="m-habit"><div class="h-emoji" style="background:${h.color}1f">${h.emoji}</div>
      <div class="m-meta"><div class="n">${esc(h.name)}</div><div class="f">${f}</div></div>
      <button class="icon-btn" onclick="openEdit('${h.id}')">✏️</button></div>`;
  }).join("")+`</div><div class="add-row"><button class="btn btn-primary btn-block" id="addBtn">+ Nuevo hábito</button></div>`;
  content.innerHTML=html; bindAdd();
}

function renderProgress(){
  if(!state.habits.length){ content.innerHTML=emptyState("Nada que mostrar aún","Tus rachas y estadísticas aparecerán aquí."); bindAdd(); return; }
  let bestOverall=0,totalDone=0,active=0;
  state.habits.forEach(h=>{ bestOverall=Math.max(bestOverall,bestStreak(h)); const c=state.completions[h.id]||{}; totalDone+=Object.keys(c).filter(k=>c[k]).length; if(currentStreak(h)>0)active++; });
  let html=`<div class="stat-grid">
    <div class="stat"><div class="v"><span class="gico">🎯</span>${bestOverall}</div><div class="k">Mejor racha</div></div>
    <div class="stat"><div class="v">${active}</div><div class="k">Rachas activas</div></div>
    <div class="stat"><div class="v">${totalDone}</div><div class="k">Total hecho</div></div></div>`;
  html+=state.habits.map(h=>{
    const cs=currentStreak(h),bs=bestStreak(h),rate=completionRate(h);
    return `<div class="card prog-card"><div class="prog-head">
      <div class="e" style="background:${h.color}1f">${h.emoji}</div>
      <div class="nm">${esc(h.name)}</div><div class="st">🎯 ${cs}</div></div>
      ${heatmap(h)}
      <div class="prog-foot"><span>Mejor racha <b>${bs}</b></span><span>Cumplimiento <b>${rate}%</b></span></div></div>`;
  }).join("");
  content.innerHTML=html; bindAdd();
}

function heatmap(h){
  const comps=state.completions[h.id]||{}; const weeks=17; const end=today();
  let start=new Date(end); start.setDate(start.getDate()-(weeks*7-1));
  const dow=(start.getDay()+6)%7; start.setDate(start.getDate()-dow);
  let cols=[], d=new Date(start);
  while(d<=end || cols.length<weeks){
    let col=[];
    for(let i=0;i<7;i++){
      if(d>end) col.push(`<div class="cell off"></div>`);
      else if(!scheduled(h,d)) col.push(`<div class="cell" style="background:var(--heat0);opacity:.45"></div>`);
      else col.push(`<div class="cell" style="background:var(--heat${comps[dk(d)]?"4":"0"})"></div>`);
      d=new Date(d); d.setDate(d.getDate()+1);
    }
    cols.push(`<div class="heat-col">${col.join("")}</div>`);
    if(cols.length>=weeks && d>end) break;
  }
  return `<div class="heat">${cols.join("")}</div>`;
}

function emptyState(t,p){
  const mark=`<svg class="big" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#F2562F" stroke-width="2"/><circle cx="12" cy="12" r="4.6" stroke="#FDBA8C" stroke-width="2"/><circle cx="12" cy="12" r="1.5" fill="#F2562F"/></svg>`;
  return `<div class="empty card">${mark}<h2>${t}</h2><p>${p}</p><button class="btn btn-primary" id="addBtn">+ Crear hábito</button></div>`;
}

/* ---------- modal ---------- */
let draft=null;
function openAdd(){ draft={id:uid(),name:"",emoji:EMOJIS[0],color:COLORS[0],freq:"daily",remindAt:null,createdAt:dk(today())}; openSheet(false); }
function openEdit(id){ const h=state.habits.find(x=>x.id===id); if(!h)return; draft=JSON.parse(JSON.stringify(h)); openSheet(true); }
function openSheet(isEdit){
  const sheet=document.getElementById("sheet"); const isCustom=draft.freq!=="daily";
  sheet.innerHTML=`
    <h3>${isEdit?"Editar hábito":"Nuevo hábito"}</h3>
    <div class="field"><label>Nombre</label>
      <input type="text" id="fName" placeholder="p. ej. Beber 2L de agua" value="${esc(draft.name)}" maxlength="40"></div>
    <div class="field"><label>Icono</label>
      <div class="emoji-pick" id="fEmoji">${EMOJIS.map(e=>`<div class="emo ${e===draft.emoji?'sel':''}" data-e="${e}">${e}</div>`).join("")}</div></div>
    <div class="field"><label>Color</label>
      <div class="picker" id="fColor">${COLORS.map(c=>`<div class="swatch ${c===draft.color?'sel':''}" data-c="${c}" style="background:${c}"></div>`).join("")}</div></div>
    <div class="field"><label>Frecuencia</label>
      <div class="seg" id="fSeg">
        <button data-m="daily" class="${!isCustom?'on':''}">Cada día</button>
        <button data-m="custom" class="${isCustom?'on':''}">Días concretos</button></div>
      <div class="freq" id="fDays" style="${isCustom?'':'display:none'}">
        ${DAYS.map((d,i)=>{const idx=DAY_IDX[i];const on=isCustom&&draft.freq.includes(idx);return `<div class="day ${on?'on':''}" data-d="${idx}">${d}</div>`;}).join("")}</div></div>
    <div class="field"><label>Recordatorio</label>
      <div class="seg" id="fRem">
        <button data-r="off" class="${!draft.remindAt?'on':''}">Sin hora</button>
        <button data-r="on" class="${draft.remindAt?'on':''}">A una hora</button></div>
      <input type="time" id="fTime" value="${draft.remindAt||'08:00'}" style="${draft.remindAt?'':'display:none'};width:100%;font-family:var(--body);font-size:16px;padding:13px 14px;border:1px solid var(--line);border-radius:12px;background:var(--bg);color:var(--ink)"></div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="cancelBtn">Cancelar</button>
      <button class="btn btn-primary" id="saveBtn">${isEdit?"Guardar":"Crear hábito"}</button></div>
    ${isEdit?`<button class="danger" id="delBtn">Eliminar hábito</button>`:""}`;
  document.getElementById("overlay").classList.add("show");
  document.getElementById("fEmoji").onclick=e=>{const t=e.target.closest(".emo");if(!t)return;draft.emoji=t.dataset.e;document.querySelectorAll("#fEmoji .emo").forEach(x=>x.classList.toggle("sel",x===t));};
  document.getElementById("fColor").onclick=e=>{const t=e.target.closest(".swatch");if(!t)return;draft.color=t.dataset.c;document.querySelectorAll("#fColor .swatch").forEach(x=>x.classList.toggle("sel",x===t));};
  document.getElementById("fSeg").onclick=e=>{const t=e.target.closest("button");if(!t)return;const m=t.dataset.m;document.querySelectorAll("#fSeg button").forEach(x=>x.classList.toggle("on",x===t));
    if(m==="daily"){draft.freq="daily";document.getElementById("fDays").style.display="none";}
    else{if(draft.freq==="daily")draft.freq=[1,2,3,4,5];document.getElementById("fDays").style.display="flex";syncDays();}};
  document.getElementById("fDays").onclick=e=>{const t=e.target.closest(".day");if(!t)return;const d=+t.dataset.d;if(draft.freq==="daily")draft.freq=[];const i=draft.freq.indexOf(d);if(i>=0)draft.freq.splice(i,1);else draft.freq.push(d);syncDays();};
  document.getElementById("fRem").onclick=e=>{const t=e.target.closest("button");if(!t)return;const on=t.dataset.r==="on";document.querySelectorAll("#fRem button").forEach(x=>x.classList.toggle("on",x===t));document.getElementById("fTime").style.display=on?"block":"none";draft.remindAt=on?(document.getElementById("fTime").value||"08:00"):null;};
  document.getElementById("fTime").onchange=e=>{draft.remindAt=e.target.value;};
  document.getElementById("cancelBtn").onclick=closeSheet;
  document.getElementById("saveBtn").onclick=()=>commit(isEdit);
  if(isEdit)document.getElementById("delBtn").onclick=()=>delHabit(draft.id);
  function syncDays(){document.querySelectorAll("#fDays .day").forEach(x=>x.classList.toggle("on",draft.freq!=="daily"&&draft.freq.includes(+x.dataset.d)));}
}
function commit(isEdit){
  const name=document.getElementById("fName").value.trim();
  if(!name){const f=document.getElementById("fName");f.focus();f.style.borderColor="var(--brand)";return;}
  draft.name=name;
  if(draft.freq!=="daily"&&draft.freq.length===0)draft.freq="daily";
  if(isEdit){const i=state.habits.findIndex(x=>x.id===draft.id);if(i>=0)state.habits[i]=draft;}
  else state.habits.push(draft);
  save(); closeSheet(); render();
}
function delHabit(id){
  if(!confirm("¿Eliminar este hábito y todo su historial?"))return;
  state.habits=state.habits.filter(h=>h.id!==id); delete state.completions[id];
  save(); closeSheet(); render();
}
function closeSheet(){ document.getElementById("overlay").classList.remove("show"); }

/* ---------- settings / backup ---------- */
function notifLabel(){
  const has=("Notification" in window);
  if(state.notify && has && Notification.permission==="granted") return "✓ Avisos activados";
  return "Activar avisos al abrir";
}
function openSettings(){
  const sheet=document.getElementById("sheet"); const total=state.habits.length;
  sheet.innerHTML=`
    <h3>Ajustes</h3>
    <p style="margin:-8px 0 18px;color:var(--muted);font-size:14px">Tus datos se guardan en este iPhone. Haz una copia de vez en cuando para no perder tu historial.</p>
    <div class="field"><label>Avisos</label>
      <button class="btn btn-ghost btn-block" id="notifBtn">${notifLabel()}</button>
      <p style="font-size:12px;color:var(--muted);margin:8px 2px 0;line-height:1.5">Te recuerda los pendientes <b>al abrir Racha</b> y marca el número en el icono. Para que suene con la app cerrada hace falta un servidor de push.</p></div>
    <div class="field"><label>Copia de seguridad</label>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" id="expBtn" style="flex:1">↓ Exportar</button>
        <button class="btn btn-ghost" id="impBtn" style="flex:1">↑ Importar</button></div>
      <input type="file" id="impFile" accept="application/json,.json" style="display:none"></div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;margin-top:6px">${total} hábito${total!==1?"s":""} · Racha v1</div>
    <div class="sheet-actions" style="margin-top:18px"><button class="btn btn-primary btn-block" id="closeSet">Cerrar</button></div>`;
  document.getElementById("overlay").classList.add("show");
  document.getElementById("closeSet").onclick=closeSheet;
  document.getElementById("expBtn").onclick=exportData;
  document.getElementById("impBtn").onclick=()=>document.getElementById("impFile").click();
  document.getElementById("impFile").onchange=importData;
  const nb=document.getElementById("notifBtn");
  if(nb) nb.onclick=async()=>{
    if(!("Notification" in window)){ alert("Este navegador no admite avisos. En iPhone, añade Racha a la pantalla de inicio y ábrela desde ahí."); return; }
    if(Notification.permission!=="granted"){
      const p=await Notification.requestPermission();
      if(p!=="granted"){ alert("Avisos no permitidos. Puedes activarlos en Ajustes del iPhone › Racha › Notificaciones."); return; }
    }
    state.notify=true; save(); nb.textContent=notifLabel();
    try{ new Notification("Racha 🎯",{body:"Avisos activados. Te recordaré tus pendientes."}); }catch(e){}
  };
}
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="racha-copia-"+dk(today())+".json";
  document.body.appendChild(a); a.click(); a.remove();
}
function importData(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{ const data=JSON.parse(r.result); if(!data.habits)throw 0;
      if(!confirm("Esto reemplazará tus datos actuales por los de la copia. ¿Continuar?"))return;
      state=data; if(!state.completions)state.completions={}; save(); closeSheet(); render();
    }catch(err){ alert("No se pudo leer el archivo de copia."); } };
  r.readAsText(f);
}

/* ---------- wiring ---------- */
function bindAdd(){ const b=document.getElementById("addBtn"); if(b)b.onclick=openAdd; }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
