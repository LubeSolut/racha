<style>
  :root{
    --bg:#EFEDE7;
    --surface:#FFFFFF;
    --ink:#1B1D24;
    --muted:#83868F;
    --line:#E4E1D9;
    --line-soft:#EFEDE6;
    --brand:#F2562F;
    --brand-soft:#FDE7DF;
    --done:#1F9D6B;
    --done-soft:#E0F2E9;
    --heat0:#EDEBE4;
    --heat1:#C8E8D7;
    --heat2:#8FD4B2;
    --heat3:#4FB888;
    --heat4:#1F9D6B;
    --display:"Space Grotesk",ui-sans-serif,system-ui,sans-serif;
    --body:"Inter",ui-sans-serif,system-ui,sans-serif;
    --mono:"Space Mono","SFMono-Regular",ui-monospace,monospace;
    --radius:18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--body);
    -webkit-font-smoothing:antialiased;
    line-height:1.45;
  }
  .app{max-width:680px;margin:0 auto;padding:22px 18px 120px}

  /* Header */
  header.top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px}
  .brand{font-family:var(--display);font-weight:700;font-size:26px;letter-spacing:-.02em;display:flex;align-items:center;gap:7px}
  .brand .flame{font-size:23px}
  .date{font-family:var(--mono);font-size:12.5px;color:var(--muted);text-align:right;text-transform:capitalize}

  /* Tabs */
  .tabs{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:4px;gap:4px;margin-bottom:20px}
  .tab{flex:1;border:0;background:transparent;font-family:var(--display);font-weight:600;font-size:14px;color:var(--muted);padding:9px 8px;border-radius:10px;cursor:pointer;transition:.15s}
  .tab.active{background:var(--ink);color:#fff}
  .tab:hover:not(.active){color:var(--ink)}

  /* Cards */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .stack{display:flex;flex-direction:column;gap:12px}

  /* Today summary */
  .summary{display:flex;align-items:center;gap:20px;margin-bottom:16px}
  .ring{position:relative;width:96px;height:96px;flex:0 0 auto}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .pct b{font-family:var(--mono);font-weight:700;font-size:22px;line-height:1}
  .ring .pct span{font-size:10px;color:var(--muted);margin-top:2px}
  .summary-text h2{font-family:var(--display);font-weight:700;font-size:20px;margin:0 0 3px;letter-spacing:-.01em}
  .summary-text p{margin:0;color:var(--muted);font-size:13.5px}

  /* Habit row (today) */
  .habit{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--line);border-radius:16px;cursor:pointer;transition:.15s;user-select:none}
  .habit:active{transform:scale(.992)}
  .habit.done{background:var(--done-soft);border-color:#CDEBDC}
  .h-emoji{width:42px;height:42px;flex:0 0 auto;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px}
  .h-main{flex:1;min-width:0}
  .h-name{font-family:var(--display);font-weight:600;font-size:15.5px;letter-spacing:-.01em}
  .habit.done .h-name{color:#157A52}
  .h-streak{font-size:12.5px;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:4px}
  .check{width:30px;height:30px;flex:0 0 auto;border-radius:50%;border:2.5px solid var(--line);display:flex;align-items:center;justify-content:center;transition:.15s}
  .habit.done .check{background:var(--done);border-color:var(--done)}
  .check svg{opacity:0;transition:.15s}
  .habit.done .check svg{opacity:1}

  /* Buttons */
  .btn{font-family:var(--display);font-weight:600;font-size:14px;border-radius:12px;padding:11px 16px;cursor:pointer;border:1px solid transparent;transition:.15s}
  .btn-primary{background:var(--brand);color:#fff}
  .btn-primary:hover{background:#DE4623}
  .btn-ghost{background:var(--surface);border-color:var(--line);color:var(--ink)}
  .btn-ghost:hover{border-color:var(--ink)}
  .btn-block{width:100%}
  .add-row{margin-top:14px}

  /* Section label */
  .label{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:24px 2px 10px}

  /* Empty */
  .empty{text-align:center;padding:46px 20px;color:var(--muted)}
  .empty .big{font-size:40px;margin-bottom:10px}
  .empty p{margin:0 0 16px;font-size:14px}

  /* Manage list */
  .m-habit{display:flex;align-items:center;gap:13px;padding:13px 14px;border-bottom:1px solid var(--line-soft)}
  .m-habit:last-child{border-bottom:0}
  .m-meta{flex:1;min-width:0}
  .m-meta .n{font-family:var(--display);font-weight:600;font-size:15px}
  .m-meta .f{font-size:12px;color:var(--muted);margin-top:1px}
  .icon-btn{background:transparent;border:0;cursor:pointer;color:var(--muted);padding:6px;border-radius:8px;font-size:15px}
  .icon-btn:hover{background:var(--bg);color:var(--ink)}

  /* Progress / stats */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px}
  .stat .v{font-family:var(--mono);font-weight:700;font-size:24px;line-height:1}
  .stat .v .flame{font-size:18px}
  .stat .k{font-size:11.5px;color:var(--muted);margin-top:5px}
  .prog-card{margin-bottom:12px}
  .prog-head{display:flex;align-items:center;gap:11px;margin-bottom:13px}
  .prog-head .e{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
  .prog-head .nm{font-family:var(--display);font-weight:600;font-size:15px;flex:1}
  .prog-head .st{font-family:var(--mono);font-size:13px;color:var(--brand);font-weight:700;display:flex;align-items:center;gap:3px}
  .heat{display:flex;gap:3px;overflow-x:auto;padding-bottom:4px}
  .heat-col{display:flex;flex-direction:column;gap:3px}
  .cell{width:12px;height:12px;border-radius:3px;background:var(--heat0)}
  .cell.off{background:transparent}
  .prog-foot{display:flex;justify-content:space-between;margin-top:11px;font-size:12px;color:var(--muted)}
  .prog-foot b{font-family:var(--mono);color:var(--ink)}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(20,21,28,.45);display:none;align-items:flex-end;justify-content:center;z-index:50;backdrop-filter:blur(2px)}
  .overlay.show{display:flex}
  .sheet{background:var(--surface);width:100%;max-width:520px;border-radius:22px 22px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));animation:rise .22s ease}
  @media(min-width:560px){.overlay{align-items:center}.sheet{border-radius:22px}}
  @keyframes rise{from{transform:translateY(30px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .sheet h3{font-family:var(--display);font-weight:700;font-size:19px;margin:0 0 18px;letter-spacing:-.01em}
  .field{margin-bottom:16px}
  .field>label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:7px}
  .field input[type=text]{width:100%;font-family:var(--body);font-size:15px;padding:12px 13px;border:1px solid var(--line);border-radius:11px;background:var(--bg);color:var(--ink)}
  .field input[type=text]:focus{outline:none;border-color:var(--brand)}
  .picker{display:flex;gap:8px;flex-wrap:wrap}
  .swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.12s}
  .swatch.sel{border-color:var(--ink)}
  .emoji-pick{display:flex;gap:6px;flex-wrap:wrap}
  .emo{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--bg);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .emo.sel{border-color:var(--brand);background:var(--brand-soft)}
  .freq{display:flex;gap:6px}
  .day{flex:1;text-align:center;font-family:var(--display);font-weight:600;font-size:12.5px;padding:9px 0;border:1px solid var(--line);border-radius:10px;background:var(--bg);color:var(--muted);cursor:pointer;transition:.12s}
  .day.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .seg{display:flex;gap:6px;margin-bottom:12px}
  .seg button{flex:1;font-family:var(--display);font-weight:600;font-size:13px;padding:9px;border:1px solid var(--line);border-radius:10px;background:var(--bg);color:var(--muted);cursor:pointer}
  .seg button.on{background:var(--brand-soft);color:var(--brand);border-color:var(--brand)}
  .sheet-actions{display:flex;gap:10px;margin-top:6px}
  .sheet-actions .btn{flex:1}
  .danger{color:var(--brand);text-align:center;font-size:13px;font-weight:600;background:none;border:0;cursor:pointer;width:100%;margin-top:14px;padding:8px;font-family:var(--display)}
</style>

<div class="app">
  <header class="top">
    <div class="brand"><span class="flame">🔥</span>Racha</div>
    <div style="display:flex;align-items:center;gap:10px"><div class="date" id="dateLabel"></div><button class="icon-btn" id="gearBtn" title="Ajustes y copia de seguridad" style="font-size:17px">⚙︎</button></div>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="today">Hoy</button>
    <button class="tab" data-view="habits">Hábitos</button>
    <button class="tab" data-view="progress">Progreso</button>
  </div>

  <div id="content"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<script>
const KEY = "racha:data";
const COLORS = ["#F2562F","#1F9D6B","#2D6CDF","#8B5CF6","#E0A823","#E0467E","#0EA5A5","#5B6470"];
const EMOJIS = ["🏃","💧","📚","🧘","💪","🥗","😴","🦷","✍️","🎯","🌱","☀️","💊","🚭","💻","🎸","📵","🧹","💰","☎️"];
const DAYS = ["L","M","X","J","V","S","D"]; // display order Mon..Sun
const DAY_IDX = [1,2,3,4,5,6,0]; // JS getDay for that display order

let state = { habits: [], completions: {} };
let view = "today";

/* ---------- storage (works both inside Claude and standalone on iPhone) ---------- */
const useCloud = (typeof window !== "undefined" && window.storage);
async function readRaw(){
  if(useCloud){ try{ const r=await window.storage.get(KEY); return r&&r.value; }catch(e){ return null; } }
  try{ return localStorage.getItem(KEY); }catch(e){ return null; }
}
async function writeRaw(v){
  if(useCloud){ try{ await window.storage.set(KEY, v); return; }catch(e){} }
  try{ localStorage.setItem(KEY, v); }catch(e){ console.warn("save failed", e); }
}
async function load(){
  try{ const raw = await readRaw(); if(raw){ state = JSON.parse(raw); } }catch(e){}
  if(!state.habits) state.habits = [];
  if(!state.completions) state.completions = {};
}
async function save(){ await writeRaw(JSON.stringify(state)); }

/* ---------- date helpers ---------- */
function dk(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function today(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function scheduled(h,d){ return h.freq==="daily" ? true : h.freq.includes(d.getDay()); }

function currentStreak(h){
  const comps = state.completions[h.id]||{};
  const tk = dk(today());
  let d = today(), streak = 0;
  for(let i=0;i<800;i++){
    if(scheduled(h,d)){
      const k = dk(d);
      if(comps[k]) streak++;
      else if(k===tk){ /* grace for today */ }
      else break;
    }
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function bestStreak(h){
  const comps = state.completions[h.id]||{};
  const keys = Object.keys(comps).filter(k=>comps[k]).sort();
  if(!keys.length) return 0;
  let start = new Date(keys[0]); start.setHours(0,0,0,0);
  let d = new Date(start), end = today();
  let run=0, best=0;
  while(d<=end){
    if(scheduled(h,d)){
      if(comps[dk(d)]){ run++; best=Math.max(best,run); }
      else run=0;
    }
    d.setDate(d.getDate()+1);
  }
  return best;
}
function completionRate(h){
  const comps = state.completions[h.id]||{};
  let start = new Date(h.createdAt); start.setHours(0,0,0,0);
  let d = new Date(start), end = today();
  let sched=0, done=0;
  while(d<=end){
    if(scheduled(h,d)){ sched++; if(comps[dk(d)]) done++; }
    d.setDate(d.getDate()+1);
  }
  return sched? Math.round(done/sched*100) : 0;
}

/* ---------- actions ---------- */
function toggleToday(id){
  const tk = dk(today());
  if(!state.completions[id]) state.completions[id]={};
  if(state.completions[id][tk]) delete state.completions[id][tk];
  else state.completions[id][tk]=true;
  save(); render();
}
function uid(){ return "h"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

/* ---------- render ---------- */
const content = document.getElementById("content");

function render(){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view===view));
  if(view==="today") renderToday();
  else if(view==="habits") renderHabits();
  else renderProgress();
}

function todaysHabits(){ return state.habits.filter(h=>scheduled(h,today())); }

function renderToday(){
  const list = todaysHabits();
  if(!state.habits.length){
    content.innerHTML = emptyState("Aún no tienes hábitos","Crea tu primer hábito y empieza tu racha hoy.");
    bindAdd(); return;
  }
  const tk = dk(today());
  const done = list.filter(h=>state.completions[h.id] && state.completions[h.id][tk]).length;
  const total = list.length;
  const pct = total? Math.round(done/total*100):0;
  const C=2*Math.PI*42, off=C-(pct/100)*C;

  let html = `<div class="card" style="margin-bottom:8px">
    <div class="summary">
      <div class="ring">
        <svg width="96" height="96" viewBox="0 0 96 96">
          <circle cx="48" cy="48" r="42" fill="none" stroke="var(--line)" stroke-width="9"/>
          <circle cx="48" cy="48" r="42" fill="none" stroke="${pct===100?'var(--done)':'var(--brand)'}" stroke-width="9"
            stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}" style="transition:.4s"/>
        </svg>
        <div class="pct"><b>${pct}%</b><span>hoy</span></div>
      </div>
      <div class="summary-text">
        <h2>${done===total&&total>0?"¡Día completo! 🎉":"Vamos a por ello"}</h2>
        <p>${done} de ${total} hábito${total!==1?"s":""} hecho${done!==1?"s":""} hoy.</p>
      </div>
    </div>
  </div>`;

  if(!list.length){
    html += `<div class="empty card"><p>Hoy no toca ningún hábito. Descansa o crea uno nuevo.</p></div>`;
  } else {
    html += `<div class="stack">` + list.map(h=>{
      const isDone = state.completions[h.id] && state.completions[h.id][tk];
      const s = currentStreak(h);
      return `<div class="habit ${isDone?'done':''}" onclick="toggleToday('${h.id}')">
        <div class="h-emoji" style="background:${h.color}1f">${h.emoji}</div>
        <div class="h-main">
          <div class="h-name">${esc(h.name)}</div>
          <div class="h-streak">${s>0?`🔥 ${s} día${s!==1?"s":""} de racha`:"Empieza tu racha"}</div>
        </div>
        <div class="check"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>`;
    }).join("") + `</div>`;
  }
  html += `<div class="add-row"><button class="btn btn-ghost btn-block" id="addBtn">+ Nuevo hábito</button></div>`;
  content.innerHTML = html;
  bindAdd();
}

function renderHabits(){
  if(!state.habits.length){
    content.innerHTML = emptyState("Sin hábitos todavía","Aquí gestionas y editas todos tus hábitos.");
    bindAdd(); return;
  }
  let html = `<div class="card stack" style="padding:6px 14px">` + state.habits.map(h=>{
    const f = h.freq==="daily" ? "Cada día" : h.freq.map(d=>DAYS[DAY_IDX.indexOf(d)]).join(" · ");
    return `<div class="m-habit">
      <div class="h-emoji" style="background:${h.color}1f">${h.emoji}</div>
      <div class="m-meta"><div class="n">${esc(h.name)}</div><div class="f">${f}</div></div>
      <button class="icon-btn" onclick="openEdit('${h.id}')">✏️</button>
    </div>`;
  }).join("") + `</div>
  <div class="add-row"><button class="btn btn-primary btn-block" id="addBtn">+ Nuevo hábito</button></div>`;
  content.innerHTML = html;
  bindAdd();
}

function renderProgress(){
  if(!state.habits.length){
    content.innerHTML = emptyState("Nada que mostrar aún","Tus rachas y estadísticas aparecerán aquí.");
    bindAdd(); return;
  }
  // overall stats
  let bestOverall=0, totalDone=0, activeStreaks=0;
  state.habits.forEach(h=>{
    bestOverall=Math.max(bestOverall,bestStreak(h));
    const c=state.completions[h.id]||{}; totalDone+=Object.keys(c).filter(k=>c[k]).length;
    if(currentStreak(h)>0) activeStreaks++;
  });
  let html = `<div class="stat-grid">
    <div class="stat"><div class="v"><span class="flame">🔥</span>${bestOverall}</div><div class="k">Mejor racha</div></div>
    <div class="stat"><div class="v">${activeStreaks}</div><div class="k">Rachas activas</div></div>
    <div class="stat"><div class="v">${totalDone}</div><div class="k">Total hecho</div></div>
  </div>`;

  html += state.habits.map(h=>{
    const cs=currentStreak(h), bs=bestStreak(h), rate=completionRate(h);
    return `<div class="card prog-card">
      <div class="prog-head">
        <div class="e" style="background:${h.color}1f">${h.emoji}</div>
        <div class="nm">${esc(h.name)}</div>
        <div class="st">🔥 ${cs}</div>
      </div>
      ${heatmap(h)}
      <div class="prog-foot"><span>Mejor racha <b>${bs}</b></span><span>Cumplimiento <b>${rate}%</b></span></div>
    </div>`;
  }).join("");
  content.innerHTML = html;
  bindAdd();
}

function heatmap(h){
  const comps = state.completions[h.id]||{};
  const weeks=17;
  const end = today();
  // align: find most recent Sunday-end column. We'll build day grid Mon..Sun.
  let start = new Date(end);
  start.setDate(start.getDate() - (weeks*7-1));
  // back up to Monday
  const dow = (start.getDay()+6)%7; // 0=Mon
  start.setDate(start.getDate()-dow);
  let cols=[];
  let d=new Date(start);
  while(d<=end || cols.length<weeks){
    let col=[];
    for(let i=0;i<7;i++){
      if(d>end){ col.push(`<div class="cell off"></div>`); }
      else if(!scheduled(h,d)){ col.push(`<div class="cell" style="background:var(--heat0);opacity:.45"></div>`); }
      else{
        const lvl = comps[dk(d)] ? "4" : "0";
        col.push(`<div class="cell" style="background:var(--heat${lvl})"></div>`);
      }
      d=new Date(d); d.setDate(d.getDate()+1);
    }
    cols.push(`<div class="heat-col">${col.join("")}</div>`);
    if(cols.length>=weeks && d>end) break;
  }
  return `<div class="heat">${cols.join("")}</div>`;
}

function emptyState(t,p){
  return `<div class="empty card"><div class="big">🔥</div><h2 style="font-family:var(--display);margin:0 0 6px;font-size:18px">${t}</h2><p>${p}</p><button class="btn btn-primary" id="addBtn">+ Crear hábito</button></div>`;
}

  openSheet(false);
}
function openEdit(id){
  const h=state.habits.find(x=>x.id===id); if(!h) return;
  draft=JSON.parse(JSON.stringify(h));

}

  document.getElementById("fEmoji").onclick=e=>{const t=e.target.closest(".emo");if(!t)return;draft.emoji=t.dataset.e;document.querySelectorAll("#fEmoji .emo").forEach(x=>x.classList.toggle("sel",x===t));};
  document.getElementById("fColor").onclick=e=>{const t=e.target.closest(".swatch");if(!t)return;draft.color=t.dataset.c;document.querySelectorAll("#fColor .swatch").forEach(x=>x.classList.toggle("sel",x===t));};
  document.getElementById("fSeg").onclick=e=>{const t=e.target.closest("button");if(!t)return;const m=t.dataset.m;document.querySelectorAll("#fSeg button").forEach(x=>x.classList.toggle("on",x===t));
    if(m==="daily"){draft.freq="daily";document.getElementById("fDays").style.display="none";}
    else{ if(draft.freq==="daily")draft.freq=[1,2,3,4,5];document.getElementById("fDays").style.display="flex";syncDays();}};
  document.getElementById("fDays").onclick=e=>{const t=e.target.closest(".day");if(!t)return;const d=+t.dataset.d;if(draft.freq==="daily")draft.freq=[];const i=draft.freq.indexOf(d);if(i>=0)draft.freq.splice(i,1);else draft.freq.push(d);syncDays();};
  document.getElementById("cancelBtn").onclick=closeSheet;
  document.getElementById("saveBtn").onclick=()=>commit(isEdit);
  if(isEdit)document.getElementById("delBtn").onclick=()=>delHabit(draft.id);
  function syncDays(){document.querySelectorAll("#fDays .day").forEach(x=>x.classList.toggle("on",draft.freq!=="daily"&&draft.freq.includes(+x.dataset.d)));}
}
function commit(isEdit){
  const name=document.getElementById("fName").value.trim();
  if(!name){document.getElementById("fName").focus();document.getElementById("fName").style.borderColor="var(--brand)";return;}
  draft.name=name;
  if(draft.freq!=="daily" && draft.freq.length===0){ draft.freq="daily"; }
  if(isEdit){ const i=state.habits.findIndex(x=>x.id===draft.id); if(i>=0)state.habits[i]=draft; }
  else state.habits.push(draft);
  save(); closeSheet(); render();
}
function delHabit(id){
  if(!confirm("¿Eliminar este hábito y todo su historial?"))return;
  state.habits=state.habits.filter(h=>h.id!==id);
  delete state.completions[id];
  save(); closeSheet(); render();
}
function closeSheet(){ document.getElementById("overlay").classList.remove("show"); }

function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="racha-copia-"+dk(today())+".json";
  document.body.appendChild(a); a.click(); a.remove();
}
function importData(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(!data.habits) throw new Error("formato");
      if(!confirm("Esto reemplazará tus datos actuales por los de la copia. ¿Continuar?")) return;
      state=data; if(!state.completions)state.completions={};
      save(); closeSheet(); render();
    }catch(err){ alert("No se pudo leer el archivo de copia."); }
  };
  r.readAsText(f);
}
